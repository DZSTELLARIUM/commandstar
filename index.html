<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اهدِ نجمة لمن تحب ⭐</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0b0c2b, #000);
  color: white;
  text-align: center;
}

.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
  from {background-position: 0 0;}
  to {background-position: 10000px 5000px;}
}

.container {
  max-width: 500px;
  margin: 50px auto;
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

h1 {
  color: gold;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: linear-gradient(45deg, gold, orange);
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px gold;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>✨ اهدِ نجمة لمن تحب ✨</h1>

  <p>هدية فريدة ومميزة… سمِّ نجمة باسم شخص عزيز ❤️</p>

  <!-- الصورة -->
  <img src="certificate.jpg" width="100%" style="border-radius:10px; margin-bottom:15px;">

  <form action="https://formspree.io/f/mwvwdgpk" method="POST">

    <input type="text" name="star_name" placeholder="اسم النجمة" required>

    <textarea name="message" placeholder="اكتب الرسالة ❤️" required></textarea>

    <input type="text" name="client_name" placeholder="اسمك" required>

    <input type="tel" name="phone" placeholder="رقم الهاتف" required>

    <input type="hidden" name="_subject" value="طلب جديد لتسمية نجمة 🌟">

    <button type="submit">🌠 تأكيد الطلب 🌠</button>

  </form>

  <p style="font-size:12px; margin-top:15px;">
    سيتم التواصل معك خلال وقت قصير ❤️
  </p>
</div>

</body>
</html>
